<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merona Cafe</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #ffe0e9, #ffd6a5, #fdffb6);
        }

        /* ================= LOADING ================= */
        #welcome {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 9999;
        }

        #welcome::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: url("https://images.unsplash.com/photo-1509042239860-f550ce710b93") center/cover;
            filter: blur(8px);
            transform: scale(1.1);
            z-index: -2;
        }

        #welcome::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }

        .logo {
            font-size: 55px;
            animation: float 2s infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-10px)
            }
        }

        .progress-bar {
            width: 260px;
            height: 10px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            overflow: hidden;
            margin-top: 12px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.25);
            position: relative;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #ffffff;
            border-radius: 20px;
            animation: load 7s linear forwards;
        }

        @keyframes load {
            from {
                width: 0%
            }

            to {
                width: 100%
            }
        }

        /* ================= MAIN ================= */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 16px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            margin-top: 18px;
        }

        /* REKOMENDASI */
        .rekom-box {
            background: white;
            padding: 8px 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .rekom-box h3 {
            margin: 0 0 5px 0;
            font-size: 15px;
        }

        /* ================= MENU FIX COMPACT ================= */
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
        }

        /* CARD DIPADATKAN */
        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: .2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
        }

        /* BODY DIPERKECIL */
        .card-body {
            padding: 8px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* TEXT LEBIH RAPAT */
        .card-body h4 {
            margin: 0;
            font-size: 14px;
        }

        .card-body p {
            margin: 0;
            font-size: 13px;
            color: #444;
        }

        /* BUTTON LEBIH COMPACT */
        button {
            background: #ff6f91;
            color: white;
            border: none;
            padding: 6px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
        }

        /* ================= CART ================= */
        .cart {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: #ff6f91;
            color: white;
            padding: 14px;
            border-radius: 50%;
            cursor: pointer;
        }

        .cartBox {
            position: fixed;
            right: 20px;
            bottom: 85px;
            width: 240px;
            background: white;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-size: 13px;
        }

        /* ================= RECEIPT ================= */
        #receipt {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            width: 300px;
            padding: 16px;
            border-radius: 12px;
            display: none;
            font-family: monospace;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .header {
            text-align: center;
            font-weight: bold;
            font-size: 17px;
        }

        .sub {
            text-align: center;
            font-size: 11px;
            color: gray;
        }

        .hr {
            border-top: 1px dashed #aaa;
            margin: 8px 0;
        }

        .item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin: 2px 0;
        }

        .total {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
        }

        .qr {
            text-align: center;
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: gray;
            margin-top: 8px;
        }

        /* SOUND */
        .sound-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: white;
            padding: 9px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <audio id="sound" loop>
        <source src="cafe.mp3" type="audio/mp3">
    </audio>

    <div class="sound-btn" onclick="toggleSound()">🔊</div>

    <!-- LOADING -->
    <div id="welcome">
        <div class="logo">☕</div>
        <h1>Merona Cafe</h1>
        <p>Loading café vibes...</p>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="container">

        <div class="rekom-box">
            <h3>⭐ Rekomendasi</h3>
            <ul id="rekom"></ul>
        </div>

        <h2 style="margin:10px 0;">Menu</h2>
        <div class="menu" id="menu"></div>

    </div>

    <!-- CART -->
    <div class="cart" onclick="toggleCart()">🛒 <span id="count">0</span></div>

    <div class="cartBox" id="cartBox">
        <h3>Keranjang</h3>
        <div id="cart"></div>
        <h4>Total: Rp <span id="total">0</span></h4>
        <button onclick="checkout()">Checkout</button>
    </div>

    <!-- RECEIPT -->
    <div id="receipt"></div>

    <script>

        let sound = document.getElementById("sound");
        sound.volume = 0.4;

        document.addEventListener("click", () => {
            sound.play().catch(() => { });
        }, { once: true });

        /* loading */
        setTimeout(() => {
            document.getElementById("welcome").style.display = "none";
        }, 7000);

        /* TIME */
        function getTime() {
            return new Date().toLocaleString("id-ID", { dateStyle: "medium", timeStyle: "short" });
        }

        /* MENU */
        let menuData = [
            { name: "Coffee Latte", price: 18000, img: "latte.jpeg" },
            { name: "Matcha Latte", price: 22000, img: "matcha.jpeg" },
            { name: "Avocado Coffee", price: 21000, img: "avocado.jpeg" },
            { name: "Espresso", price: 15000, img: "americano.jpeg" },
            { name: "Lemon Tea", price: 13000, img: "lemon .jpeg" },
            { name: "Mango Yakult", price: 20000, img: "mango.jpeg" },
            { name: "Strawberry Yakult", price: 20000, img: "stoberi.jpeg" },
            { name: "Nasi Ayam Sambal Matah", price: 27000, img: "ayam.jpeg" },
            { name: "Nasi Goreng", price: 25000, img: "nasgpor.jpeg" },
            { name: "Spaghetti Bolognese", price: 26000, img: "spageti.jpeg" },
            { name: "Burger Mexico", price: 20000, img: "burger.jpeg" },
            { name: "Mango Sticky Rice", price: 19000, img: "mango.jpeg" },
            { name: "Sate Taichan", price: 22000, img: "taichan.jpeg" },
            { name: "French Fries", price: 15000, img: "kentang.jpeg" },
            { name: "Roti Bakar", price: 16000, img: "roti.jpeg" },
            { name: "Bola Ubi", price: 13000, img: "ubi.jpeg" },
            { name: "Cireng Saus Rujak", price: 15000, img: "cireng.jpeg" },
            { name: "Cheese Cake", price: 23000, img: "cheese.jpeg" },
            { name: "Cookies", price: 20000, img: "cookies.jpeg" }
        ];

        let rekom = [
            "Coffee Latte ☕ (Best Seller)",
            "Cheesecake 🍰 (Sweet Mood)",
            "Matcha Latte 🍵 (Calm Energy)"
        ];

        let cart = {};

        /* render */
        function renderMenu() {
            let html = "";
            menuData.forEach((m, i) => {
                html += `
<div class="card">
<img src="${m.img}" onerror="this.src='https://via.placeholder.com/150'">
<div class="card-body">
<h4>${m.name}</h4>
<p>Rp ${m.price}</p>
<button onclick="add(${i})">Tambah</button>
</div>
</div>`;
            });
            document.getElementById("menu").innerHTML = html;

            document.getElementById("rekom").innerHTML =
                rekom.map(x => `<li>${x}</li>`).join("");
        }

        /* cart */
        function add(i) {
            if (!cart[i]) cart[i] = { ...menuData[i], qty: 0 };
            cart[i].qty++;
            renderCart();
        }

        function renderCart() {
            let total = 0, count = 0, html = "";
            for (let i in cart) {
                let it = cart[i];
                total += it.price * it.qty;
                count += it.qty;
                html += `${it.name} x${it.qty}<br>`;
            }
            document.getElementById("cart").innerHTML = html;
            document.getElementById("total").innerText = total;
            document.getElementById("count").innerText = count;
        }

        function toggleCart() {
            let b = document.getElementById("cartBox");
            b.style.display = b.style.display === "block" ? "none" : "block";
        }

        /* checkout */
        function checkout() {

            let items = "";
            let total = 0;

            for (let i in cart) {
                let it = cart[i];
                items += `<div class="item"><span>${it.name} x${it.qty}</span><span>Rp ${it.price * it.qty}</span></div>`;
                total += it.price * it.qty;
            }

            document.getElementById("receipt").innerHTML = `

<div class="header">☕ MERONA CAFE</div>
<div class="sub">${getTime()}</div>

<div class="hr"></div>

${items}

<div class="hr"></div>

<div class="total">
<span>TOTAL</span>
<span>Rp ${total}</span>
</div>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=MeronaCafe-${total}">
</div>

<div class="footer">
Thank you for visiting ☕
</div>

<br>
<div style="text-align:center;">
<button onclick="document.getElementById('receipt').style.display='none'">Tutup</button>
</div>

`;

            document.getElementById("receipt").style.display = "block";

            cart = {};
            renderCart();
        }

        /* sound */
        function toggleSound() {
            if (sound.paused) sound.play();
            else sound.pause();
        }

        renderMenu();

    </script>

</body>

</html>
